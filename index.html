<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龟兹国 · Kingdom of Kucha</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue','PingFang SC',Arial,sans-serif;background:#0a0603;color:#e8dcc8;overflow-x:hidden}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 45%,#1c0e06 0%,#0d0703 55%,#000 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:opacity 1.4s ease,filter 1.4s ease}
#splash.exit{opacity:0;filter:blur(28px) brightness(3);pointer-events:none}
#flash{position:fixed;inset:0;z-index:10000;background:#fff;opacity:0;pointer-events:none;transition:opacity .18s ease}
#star-field{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur) ease-in-out infinite var(--delay)}
@keyframes twinkle{0%,100%{opacity:var(--lo);transform:scale(1)}50%{opacity:1;transform:scale(1.9)}}
#particles{position:absolute;inset:0;pointer-events:none}
.particle{position:absolute;border-radius:50%;background:radial-gradient(circle,#f3e5ab 0%,rgba(212,175,55,0) 70%);bottom:-10px;left:var(--x);width:var(--sz);height:var(--sz);opacity:0;animation:floatUp var(--dur) ease-in infinite var(--delay)}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(0)}8%{opacity:.9;transform:translateY(-15px) scale(1)}85%{opacity:.25}100%{opacity:0;transform:translateY(-65vh) scale(.3)}}
.rays{position:absolute;width:520px;height:520px;border-radius:50%;background:repeating-conic-gradient(rgba(212,175,55,.18) 0deg,rgba(212,175,55,0) 15deg,rgba(212,175,55,0) 30deg);animation:spinCW 14s linear infinite;pointer-events:none}
.rays-inner{position:absolute;width:340px;height:340px;border-radius:50%;background:repeating-conic-gradient(rgba(180,40,40,.14) 0deg,rgba(180,40,40,0) 10deg,rgba(180,40,40,0) 30deg);animation:spinCCW 9s linear infinite;pointer-events:none}
.emblem-wrap{position:relative;width:200px;height:200px;margin-bottom:36px;z-index:10}
.emblem-glow{position:absolute;inset:-30px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.38) 0%,rgba(180,40,40,.14) 45%,transparent 70%);animation:glowPulse 2.2s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.14);opacity:1}}
.emblem-scan{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,rgba(212,175,55,.6) 28deg,rgba(212,175,55,.12) 56deg,transparent 85deg,transparent 360deg);animation:scanSpin 2s linear infinite;z-index:6}
@keyframes scanSpin{to{transform:rotate(360deg)}}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent}
.ring-1{inset:-18px;border-top-color:#d4af37;border-right-color:#d4af37;animation:spinCW 2.8s linear infinite}
.ring-2{inset:-32px;border-bottom-color:rgba(180,40,40,.7);border-left-color:rgba(180,40,40,.7);animation:spinCCW 3.6s linear infinite}
.ring-3{inset:-47px;border-color:rgba(212,175,55,.2);animation:pulsRing 2.5s ease-in-out infinite}
.ring-dot{position:absolute;inset:-47px;border-radius:50%;pointer-events:none;animation:pulsRing 2.5s ease-in-out infinite}
.ring-3::before,.ring-3::after,.ring-dot::before,.ring-dot::after{content:'';position:absolute;width:5px;height:5px;background:#d4af37;border-radius:1px;transform:rotate(45deg);box-shadow:0 0 6px rgba(212,175,55,.8)}
.ring-3::before{top:-3px;left:50%;margin-left:-3px}.ring-3::after{bottom:-3px;left:50%;margin-left:-3px}
.ring-dot::before{left:-3px;top:50%;margin-top:-3px}.ring-dot::after{right:-3px;top:50%;margin-top:-3px}
@keyframes spinCW{to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}
@keyframes pulsRing{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.07);opacity:.9}}
.emblem-img{width:200px;height:200px;border-radius:50%;object-fit:cover;position:relative;z-index:7;opacity:0;animation:emblemIn 1s cubic-bezier(.16,1,.3,1) forwards .6s;box-shadow:0 0 0 3px rgba(212,175,55,.6),0 0 30px rgba(212,175,55,.4),0 0 70px rgba(180,40,40,.25)}
@keyframes emblemIn{from{opacity:0;transform:scale(.7) rotate(-18deg);filter:blur(14px)}to{opacity:1;transform:scale(1) rotate(0deg);filter:blur(0)}}
.splash-title{display:flex;gap:16px;margin-bottom:14px}
.s-char{font-family:"Songti SC","STSong","SimSun",serif;font-size:3.4rem;color:#d4af37;opacity:0;display:inline-block;text-shadow:0 0 14px rgba(212,175,55,.9),0 0 40px rgba(212,175,55,.4);animation:charIn .7s cubic-bezier(.16,1,.3,1) forwards}
.s-char:nth-child(1){animation-delay:1.2s}.s-char:nth-child(2){animation-delay:1.55s}.s-char:nth-child(3){animation-delay:1.9s}
@keyframes charIn{from{opacity:0;transform:translateY(22px) scale(.8);filter:blur(10px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.ornament-splash{display:flex;align-items:center;gap:14px;margin-bottom:12px;opacity:0;animation:fadeUp .8s ease forwards 2.3s}
.orn-line-s{width:100px;height:1px;background:linear-gradient(90deg,transparent,#d4af37 40%,#8b1a1a,transparent)}
.orn-gem{width:7px;height:7px;background:#d4af37;transform:rotate(45deg);box-shadow:0 0 10px rgba(212,175,55,.8)}
.splash-status{font-family:"Courier New",monospace;font-size:.72rem;color:rgba(212,175,55,.5);letter-spacing:3px;min-height:1.2em;margin-bottom:22px;opacity:0;animation:fadeUp .6s ease forwards 2.2s}
.progress-wrap{width:290px;opacity:0;animation:fadeUp .6s ease forwards .3s}
.progress-track{height:2px;background:rgba(255,255,255,.06);border-radius:2px;position:relative;overflow:visible}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#8b1a1a 0%,#d4af37 55%,#f3e5ab 100%);border-radius:2px;position:relative}
.progress-fill::after{content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,#f3e5ab 0%,rgba(212,175,55,.3) 60%,transparent 100%);box-shadow:0 0 8px #f3e5ab}
.pct-row{display:flex;justify-content:space-between;margin-top:10px}
.pct-num{font-family:"Courier New",monospace;font-size:.9rem;color:#d4af37}
.pct-label-r{font-family:"Cinzel",monospace;font-size:.62rem;color:rgba(212,175,55,.35);letter-spacing:4px;text-transform:uppercase;align-self:flex-end}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── LANG BAR ── */
#lang-bar{position:fixed;top:18px;right:18px;z-index:500;display:flex;gap:4px;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);border:1px solid rgba(212,175,55,.18);border-radius:100px;padding:5px 8px;opacity:0;transition:opacity .5s}
.lang-btn{background:none;border:none;color:rgba(212,175,55,.55);cursor:pointer;font-size:.72rem;padding:4px 10px;border-radius:100px;transition:all .25s;font-family:inherit}
.lang-btn:hover{color:#d4af37}.lang-btn.active{background:rgba(212,175,55,.18);color:#d4af37}

/* ── MUSIC PLAYER ── */
#music-player{position:fixed;bottom:28px;left:22px;z-index:400;display:flex;align-items:center;gap:10px;background:rgba(10,6,3,.88);border:1px solid rgba(212,175,55,.35);border-radius:100px;padding:10px 18px 10px 14px;backdrop-filter:blur(14px);box-shadow:0 4px 24px rgba(0,0,0,.55);transition:all .3s}
#music-player:hover{border-color:rgba(212,175,55,.65)}
#music-eq{display:flex;align-items:flex-end;gap:3px;height:18px;width:22px;cursor:pointer;flex-shrink:0}
#music-eq span{display:block;width:3px;background:#d4af37;border-radius:2px;transition:height .15s}
#music-eq span:nth-child(1){height:6px;animation:none}
#music-eq span:nth-child(2){height:10px;animation:none}
#music-eq span:nth-child(3){height:14px;animation:none}
#music-eq span:nth-child(4){height:8px;animation:none}
#music-player.playing #music-eq span:nth-child(1){animation:eq1 .8s ease-in-out infinite}
#music-player.playing #music-eq span:nth-child(2){animation:eq2 .6s ease-in-out infinite .1s}
#music-player.playing #music-eq span:nth-child(3){animation:eq3 .9s ease-in-out infinite .2s}
#music-player.playing #music-eq span:nth-child(4){animation:eq2 .7s ease-in-out infinite .05s}
@keyframes eq1{0%,100%{height:4px}50%{height:16px}}
@keyframes eq2{0%,100%{height:8px}50%{height:18px}}
@keyframes eq3{0%,100%{height:14px}50%{height:5px}}
#music-playbtn{background:none;border:none;color:#d4af37;cursor:pointer;font-size:1rem;padding:0;width:20px;text-align:center;flex-shrink:0;line-height:1;transition:opacity .2s}
#music-playbtn:hover{opacity:.7}
#music-vol{-webkit-appearance:none;appearance:none;width:70px;height:3px;border-radius:2px;background:rgba(212,175,55,.25);outline:none;cursor:pointer;flex-shrink:0}
#music-vol::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#d4af37;cursor:pointer;box-shadow:0 0 4px rgba(212,175,55,.6)}
#music-mute{background:none;border:none;color:rgba(212,175,55,.55);cursor:pointer;font-size:.78rem;padding:0;flex-shrink:0;transition:color .2s;line-height:1}
#music-mute:hover{color:#d4af37}

/* ── UNLOCK BUTTON ── */
#unlock-btn{position:fixed;bottom:28px;right:22px;z-index:400;background:rgba(10,6,3,.85);border:1px solid rgba(212,175,55,.4);color:#d4af37;padding:12px 22px;border-radius:100px;cursor:pointer;font-family:"Songti SC",serif;letter-spacing:3px;font-size:.85rem;backdrop-filter:blur(12px);transition:all .3s;display:none;box-shadow:0 4px 24px rgba(0,0,0,.5)}
#unlock-btn:hover{background:rgba(212,175,55,.15);border-color:rgba(212,175,55,.7)}
#unlock-btn.done{color:#6ecf8e;border-color:rgba(110,207,142,.4);cursor:default}

/* ── LOGIN MODAL ── */
#login-modal{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center}
#login-modal.open{display:flex}
.modal-box{position:relative;width:340px;padding:44px 38px;background:linear-gradient(145deg,#120a04,#0a0602);border:1px solid rgba(212,175,55,.2);border-radius:22px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.8)}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:rgba(212,175,55,.35);font-size:1.1rem;cursor:pointer;transition:color .2s}
.modal-close:hover{color:#d4af37}
.modal-logo{width:68px;height:68px;border-radius:50%;object-fit:cover;margin-bottom:14px;border:2px solid rgba(212,175,55,.3);box-shadow:0 0 24px rgba(212,175,55,.2)}
.modal-title{font-family:"Songti SC","STSong",serif;font-size:1.6rem;color:#d4af37;margin-bottom:5px}
.modal-sub{font-size:.7rem;color:rgba(212,175,55,.38);letter-spacing:4px;margin-bottom:22px}
.modal-orn{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:22px}
.modal-orn-line{width:50px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.4),transparent)}
.modal-orn-gem{width:5px;height:5px;background:#d4af37;transform:rotate(45deg);box-shadow:0 0 5px rgba(212,175,55,.6)}
.modal-field{margin-bottom:11px}
.modal-field input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.18);border-radius:9px;padding:11px 14px;color:#e8dcc8;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .25s;text-align:center;letter-spacing:1px}
.modal-field input::placeholder{color:rgba(212,175,55,.28);letter-spacing:3px}
.modal-field input:focus{border-color:rgba(212,175,55,.48)}
.modal-btn{width:100%;margin-top:6px;padding:12px;background:linear-gradient(135deg,#8b1a1a 0%,#b8922a 60%,#d4af37 100%);border:none;border-radius:9px;color:#fff;font-size:.95rem;font-family:"Songti SC",serif;letter-spacing:7px;cursor:pointer;transition:opacity .25s}
.modal-btn:hover{opacity:.85}
.modal-btn:disabled{opacity:.5;cursor:not-allowed}
.modal-error{margin-top:12px;font-size:.76rem;color:rgba(220,80,80,.9);min-height:1.1em;letter-spacing:1px}
.modal-alt{margin-top:14px}
.modal-alt a{font-size:.72rem;color:rgba(212,175,55,.4);text-decoration:none;letter-spacing:1px;border-bottom:1px solid rgba(212,175,55,.2);padding-bottom:1px;transition:color .2s}
.modal-alt a:hover{color:rgba(212,175,55,.75)}
.modal-q{font-family:"Songti SC",serif;font-size:1rem;color:rgba(212,175,55,.8);margin-bottom:16px;line-height:1.7}

/* ── PHOTO LOCK ── */
.photo-img-wrap{position:relative;overflow:hidden;background:#0a0603;min-height:80px}
.photo-img-wrap img{width:100%;display:block;transition:filter .8s ease,opacity .8s ease}
img.locked{filter:blur(20px) brightness(.4);opacity:.6}
.lock-veil{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;transition:opacity .6s ease}
.lock-veil .lv-icon{font-size:2rem;opacity:.7}
.lock-veil .lv-txt{font-family:"Songti SC",serif;font-size:.75rem;color:rgba(212,175,55,.7);letter-spacing:2px}
body.unlocked .lock-veil{opacity:0}
.marq-card{position:relative}
.marq-card img.locked{filter:blur(14px) brightness(.4)}
.marq-lock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;opacity:.6;pointer-events:none;transition:opacity .6s}
body.unlocked .marq-lock{opacity:0}

/* ── MAIN ── */
#main{opacity:0;transition:opacity .8s ease}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;background:radial-gradient(ellipse at 50% 40%,#1c0e06 0%,#0d0703 55%,#000 100%);padding:40px 20px;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><circle cx="30" cy="30" r=".6" fill="rgba(212,175,55,.12)"/></svg>') repeat;pointer-events:none}
.hero-logo{width:110px;height:110px;border-radius:50%;object-fit:cover;margin-bottom:28px;box-shadow:0 0 40px rgba(212,175,55,.3),0 0 80px rgba(180,40,40,.15);border:2px solid rgba(212,175,55,.3)}
.hero h1{font-family:"Songti SC","STSong",serif;font-size:4.8rem;color:#d4af37;text-shadow:0 0 20px rgba(212,175,55,.5);line-height:1.1;margin-bottom:16px}
.hero-sub{font-size:1.1rem;color:rgba(212,175,55,.7);letter-spacing:4px;margin-bottom:10px}
.hero-ornament{display:flex;align-items:center;gap:18px;margin:24px 0}
.hero-line{width:130px;height:1px;background:linear-gradient(90deg,transparent,#d4af37 40%,#8b1a1a,transparent)}
.hero-gem{width:8px;height:8px;background:#d4af37;transform:rotate(45deg);box-shadow:0 0 10px rgba(212,175,55,.8)}

/* ── MARQUEE ── */
.marq-section{background:#080402;padding:70px 0;overflow:hidden}
.marq-head{text-align:center;margin-bottom:36px}
.marq-head h2{font-family:"Songti SC",serif;font-size:1.6rem;color:#d4af37;letter-spacing:8px}
.marq-wrap{-webkit-mask-image:linear-gradient(90deg,transparent 0%,#000 7%,#000 93%,transparent 100%);mask-image:linear-gradient(90deg,transparent 0%,#000 7%,#000 93%,transparent 100%);overflow:hidden}
.marq-track{display:flex;gap:14px;width:max-content;animation:marqScroll 60s linear infinite}
.marq-wrap:hover .marq-track{animation-play-state:paused}
@keyframes marqScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marq-card{flex-shrink:0;width:210px;border-radius:12px;overflow:hidden;cursor:pointer;background:#111}
.marq-card img{height:295px;object-fit:cover;display:block;width:100%}
.marq-card-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent 0%,rgba(0,0,0,.85) 100%);padding:24px 12px 12px}
.marq-card-title{font-family:"Songti SC",serif;font-size:.88rem;color:#d4af37;text-shadow:0 1px 4px rgba(0,0,0,.8)}

/* ── HISTORY ── */
.history-section{padding:100px 40px;background:linear-gradient(180deg,#080402 0%,#0d0804 100%)}
.section-header{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:60px}
.section-header h2{font-family:"Songti SC","STSong",serif;font-size:2.1rem;color:#d4af37;white-space:nowrap;text-shadow:0 0 20px rgba(212,175,55,.3)}
.sec-line{flex:1;max-width:180px;height:1px;background:linear-gradient(90deg,transparent,#d4af37 50%,transparent)}
.history-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px;max-width:980px;margin:0 auto}
.hist-card{background:rgba(212,175,55,.03);border:1px solid rgba(212,175,55,.1);border-radius:16px;padding:34px;position:relative;transition:border-color .3s,background .3s}
.hist-card:hover{border-color:rgba(212,175,55,.25);background:rgba(212,175,55,.06)}
.hist-num{font-family:"Songti SC",serif;font-size:4.5rem;color:rgba(212,175,55,.07);position:absolute;top:14px;right:20px;line-height:1;user-select:none}
[dir="rtl"] .hist-num{right:auto;left:20px}
.hist-card h3{font-family:"Songti SC","STSong",serif;font-size:1.25rem;color:#d4af37;margin-bottom:14px;position:relative}
.hist-card h3::before{content:'';position:absolute;bottom:-6px;left:0;width:30px;height:1.5px;background:rgba(212,175,55,.4)}
[dir="rtl"] .hist-card h3::before{left:auto;right:0}
.hist-card p{line-height:2;color:rgba(232,220,200,.72);font-size:.88rem;margin-top:16px}

/* ── GALLERY ── */
.gallery-section{padding:100px 40px;background:#060300}
.gallery{columns:3;column-gap:16px;max-width:1180px;margin:0 auto}
.photo-card{break-inside:avoid;margin-bottom:16px;border-radius:14px;overflow:hidden;background:#0f0c09;border:1px solid rgba(212,175,55,.07);transition:border-color .3s}
.photo-card:hover{border-color:rgba(212,175,55,.2)}
.photo-img-wrap img{transition:transform .5s ease,filter .8s ease,opacity .8s ease}
.photo-card:hover .photo-img-wrap img{transform:scale(1.03)}
.photo-caption{padding:18px}
.photo-title{font-family:"Songti SC","STSong",serif;font-size:1.05rem;color:#d4af37;margin-bottom:10px}
.photo-quote{font-family:"Songti SC","STSong",serif;font-size:.82rem;color:rgba(212,175,55,.72);font-style:italic;line-height:1.7;border-left:2px solid rgba(212,175,55,.3);padding-left:10px;margin-bottom:5px}
[dir="rtl"] .photo-quote{border-left:none;border-right:2px solid rgba(212,175,55,.3);padding-left:0;padding-right:10px}
.photo-author{font-size:.72rem;color:rgba(212,175,55,.38);margin-bottom:12px;padding-left:12px}
[dir="rtl"] .photo-author{padding-left:0;padding-right:12px}
.photo-desc{font-size:.82rem;color:rgba(232,220,200,.68);line-height:1.85;margin-bottom:12px}
.photo-anime{font-size:.78rem;color:rgba(220,160,160,.9);background:rgba(140,30,30,.1);border:1px solid rgba(140,30,30,.15);border-radius:8px;padding:9px 12px;line-height:1.75;font-style:italic}

/* ── FOOTER ── */
footer{padding:60px 40px;text-align:center;background:#040200;border-top:1px solid rgba(212,175,55,.08)}
.footer-logo{width:56px;height:56px;border-radius:50%;object-fit:cover;margin-bottom:16px;opacity:.55}
.footer-text{font-family:"Cinzel","Times New Roman",serif;font-size:.76rem;color:rgba(212,175,55,.3);letter-spacing:3px}
.footer-copy{font-size:.7rem;color:rgba(212,175,55,.15);margin-top:8px}

[dir="rtl"] body{font-family:'Helvetica Neue','Noto Sans Arabic',Arial,sans-serif}
@media(max-width:900px){.gallery{columns:2}.history-grid{grid-template-columns:1fr}.hero h1{font-size:3.2rem}}
@media(max-width:520px){.gallery{columns:1}.hero h1{font-size:2.4rem}.history-section{padding:70px 20px}.gallery-section{padding:70px 20px}}
</style>
</head>
<body>

<div id="flash"></div>

<!-- SPLASH -->
<div id="splash">
  <div id="star-field"></div>
  <div id="particles"></div>
  <div class="rays"></div>
  <div class="rays-inner"></div>
  <div class="emblem-wrap">
    <div class="emblem-glow"></div>
    <div class="emblem-scan"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ring-dot"></div>
    <img class="emblem-img" src="a.png" alt="龟兹国">
  </div>
  <div class="splash-title">
    <span class="s-char">龟</span><span class="s-char">兹</span><span class="s-char">国</span>
  </div>
  <div class="ornament-splash">
    <div class="orn-line-s"></div><div class="orn-gem"></div><div class="orn-line-s"></div>
  </div>
  <div class="splash-status" id="loadStatus"></div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="pct-row">
      <span class="pct-num"><span id="pctNum">0</span>%</span>

<script>
const WORKER='https://password.haiyangkwong.workers.dev';

const PHOTOS=[
  {file:'0163b65938f7f910287528fb277fad9f.jpg',zh:{title:'策马天涯',quote:'男儿何不带吴钩，收取关山五十州',author:'李贺《南园》',desc:'千里江山，尽在脚下。以一身布衣走遍山河，笑傲苍穹，问这茫茫世间谁主沉浮？',anime:'「本大人偶尔也需要欣赏一下自己的帅气背影，毕竟这种级别的帅不能浪费！」'},en:{title:'Riding to Infinity',quote:'"Why not take a sword and conquer fifty states?" — Li He',desc:'A thousand miles of mountains lie at one\'s feet.',anime:'"The Great Me occasionally needs to admire his own dashing silhouette!"'},fr:{title:'Chevauchée vers l\'Infini',quote:'"Pourquoi ne pas saisir une épée?" — Li He',desc:'Mille lieues de montagnes s\'étendent sous ses pieds.',anime:'"Le Grand Moi a parfois besoin d\'admirer sa propre silhouette!"'},ar:{title:'ركوب نحو اللانهاية',quote:'"لماذا لا تحمل سيفاً؟" — لي هه',desc:'آلاف الأميال من الجبال تمتد تحت القدمين.',anime:'"الشخص العظيم يحتاج أحياناً لتأمل مظهره المهيب!"'}},
  {file:'1feb3fa7d864f102584b71fc8ab97886.jpg',zh:{title:'蓝衫逸客',quote:'天生我材必有用，千金散尽还复来',author:'李白《将进酒》',desc:'一袭蓝衫，自带王者气场。眼神之中自有乾坤，举手投足皆是风度，这便是龟兹国王的日常最低配置。',anime:'「哼，这种程度的帅气对本大人而言，不过是今日最低配置罢了！」'},en:{title:'The Sapphire Scholar',quote:'"Heaven endowed me with talents for a use." — Li Bai',desc:'A sapphire robe carrying a king\'s aura.',anime:'"This level of handsomeness is merely my lowest setting for the day!"'},fr:{title:'Le Savant en Bleu',quote:'"Le ciel m\'a doué de talents." — Li Bai',desc:'Une robe de saphir portant l\'aura d\'un roi.',anime:'"Ce niveau de beauté n\'est que mon réglage minimal du jour!"'},ar:{title:'العالم بالرداء الأزرق',quote:'"منحني السماء مواهب." — لي باي',desc:'رداء أزرق يحمل هيبة ملك.',anime:'"هذا المستوى من الوسامة ليس سوى إعدادي الأدنى!"'}},
  {file:'25dac98c309b5002e04d398a856aa6a4.jpg',zh:{title:'古道西风',quote:'行到水穷处，坐看云起时',author:'王维《终南别业》',desc:'踏遍古道，见过无数风景，方知人生至境不在于目的地，而在于途中那一刻的云卷云舒。',anime:'「在本大人的字典里，迷路叫做"深度探索"，请务必记住这个区别！」'},en:{title:'Ancient Roads, Western Wind',quote:'"Walking to where the waters end, I sit and watch the clouds rise." — Wang Wei',desc:'The pinnacle of life lies in the clouds that rise along the way.',anime:'"In the Great Me\'s dictionary, getting lost is called \'deep exploration\'!"'},fr:{title:'Routes Anciennes',quote:'"Marchant jusqu\'où les eaux s\'arrêtent." — Wang Wei',desc:'Le sommet de la vie réside dans les nuages qui s\'élèvent.',anime:'"Se perdre s\'appelle \'exploration profonde\'!"'},ar:{title:'الطرق القديمة',quote:'"أمشي حتى تنتهي المياه." — وانغ وي',desc:'ذروة الحياة في الغيوم التي ترتفع.',anime:'"الضياع يُسمى \'الاستكشاف العميق\'!"'}},
  {file:'3190a20ecfb9c0fffa103812925b349d.jpg',zh:{title:'铁骨英姿',quote:'壮志饥餐胡虏肉，笑谈渴饮匈奴血',author:'岳飞《满江红》',desc:'铁栏为伴，绿荫为幕，一身校服亦难掩王者之气。横眉冷对，是龟兹国王对平庸世界最有力的回应。',anime:'「本大人就算穿校服，也是全场最靓的仔，这是天赋，不接受反驳！」'},en:{title:'Iron Spirit',quote:'"With great ambition I shall feast on enemy flesh." — Yue Fei',desc:'Even a school uniform cannot conceal the aura of a king.',anime:'"Even in a school uniform, the Great Me is the most dazzling — this is talent!"'},fr:{title:'Esprit de Fer',quote:'"Avec grande ambition." — Yue Fei',desc:'Même un uniforme scolaire ne peut dissimuler l\'aura d\'un roi.',anime:'"Le Grand Moi est le plus éblouissant — c\'est du talent!"'},ar:{title:'روح حديدية',quote:'"بطموح عظيم." — يوه فاي',desc:'حتى زي المدرسة لا يستطيع إخفاء هيبة ملك.',anime:'"الشخص العظيم هو الأكثر بريقاً — هذا موهبة!"'}},
  {file:'3d41ca59dbf18608cc139cef2182ae62.jpg',zh:{title:'指点江山',quote:'数风流人物，还看今朝',author:'毛泽东《沁园春·雪》',desc:'江山如画，一时多少豪杰。唯有真正的王者，方能在历史的长河中留下不朽的印记。',anime:'「本大人指点江山之际，请不要被本大人的气势所压倒，那只是日常状态罢了。」'},en:{title:'Commanding Mountains & Rivers',quote:'"To find the truly great, look to the present age." — Mao Zedong',desc:'Only the true king can leave an immortal mark in history.',anime:'"Don\'t be overwhelmed by the Great Me\'s aura — that\'s just my resting state."'},fr:{title:'Commandant les Montagnes',quote:'"Pour trouver les vraiment grands." — Mao Zedong',desc:'Seul le vrai roi peut laisser une marque immortelle.',anime:'"C\'est mon état de repos."'},ar:{title:'تسيير الجبال',quote:'"للعثور على العظماء." — ماو تسي تونغ',desc:'فقط الملك الحقيقي يترك أثراً خالداً.',anime:'"هذه مجرد حالتي الطبيعية."'}},
  {file:'45e7bd2712fbd336ce0414b877d95185.jpg',zh:{title:'红蝶风华',quote:'云想衣裳花想容，春风拂槛露华浓',author:'李白《清平调》',desc:'一枚红蝴蝶结，点睛全局。发型如利剑出鞘，眼神蕴藏千言，此刻龟兹国王的气场已超越时空。',anime:'「蝴蝶结是本大人今日战斗力的加成道具，颜值暴击率直接拉满！」'},en:{title:'Red Bow Radiance',quote:'"Clouds suggest her robes, flowers her face." — Li Bai',desc:'One red bow tie, the finishing touch. The King\'s aura transcends time.',anime:'"The bow tie is today\'s power-up accessory — charm crit rate maxed out!"'},fr:{title:'Éclat du Papillon Rouge',quote:'"Les nuages évoquent ses robes." — Li Bai',desc:'Un nœud papillon rouge, la touche finale.',anime:'"Le nœud papillon est l\'accessoire boost aujourd\'hui!"'},ar:{title:'بريق الفراشة الحمراء',quote:'"الغيوم تقترح ثوبها." — لي باي',desc:'ربطة عنق حمراء، اللمسة الأخيرة.',anime:'"ربطة العنق هي ملحق تعزيز القدرة اليوم!"'}},
  {file:'55572f9238f37963d9a94f3171cd17d4.jpg',zh:{title:'叱咤南国',quote:'我自横刀向天笑，去留肝胆两昆仑',author:'谭嗣同《狱中题壁》',desc:'双臂交叉，绿意盎然，以岿然不动之姿立于天地之间。南国的蓬勃生机，衬托出少年郎一往无前的意气。',anime:'「双手抱胸是本大人标准的"我在思考如何拯救世界"的姿势，懂的都懂！」'},en:{title:'Commanding the South',quote:'"I laugh to heaven with my blade." — Tan Sitong',desc:'Arms crossed, surrounded by lush greenery — standing unmoved between heaven and earth.',anime:'"Arms crossed is the Great Me\'s standard \'thinking about how to save the world\' pose!"'},fr:{title:'Commandant le Sud',quote:'"Je ris au ciel avec ma lame." — Tan Sitong',desc:'Bras croisés, debout impassible.',anime:'"Bras croisés est la pose standard!"'},ar:{title:'يتحكم في الجنوب',quote:'"أضحك للسماء بسيفي." — تان سيتونغ',desc:'ذراعان متقاطعتان، واقف ثابتاً.',anime:'"الذراعان المتقاطعتان هي وضعيتي القياسية!"'}},
  {file:'611b2b95bf3c863891fad857607550dd.jpg',zh:{title:'车上欢颜',quote:'与君歌一曲，请君为我倾耳听',author:'李白《将进酒》',desc:'旅途中的笑声是最动人的乐章。两位少年并肩而坐，一个纵情大笑，一个沉默以对，各有其风。',anime:'「人生中那些在大巴上哈哈大笑的瞬间，才是最真实的快乐，比什么都值钱！」'},en:{title:'Laughter on the Road',quote:'"Let me sing you a song." — Li Bai',desc:'Laughter on the journey is the most moving melody.',anime:'"Those moments of laughing out loud on the bus — that\'s the realest joy!"'},fr:{title:'Rires en Route',quote:'"Laissez-moi vous chanter une chanson." — Li Bai',desc:'Le rire en voyage est la mélodie la plus émouvante.',anime:'"Ces moments de rires dans le bus — c\'est la vraie joie!"'},ar:{title:'ضحكات في الطريق',quote:'"دعني أغني لك أغنية." — لي باي',desc:'الضحك في الرحلة هو أكثر الألحان تأثيراً.',anime:'"تلك اللحظات من الضحك — هذه هي البهجة الحقيقية!"'}},
  {file:'6a60ea8f7109449814792e5dc6f60ec0.jpg',zh:{title:'闲庭信步',quote:'独行潭底影，数息树边身',author:'贾岛《送无可上人》',desc:'双手插兜，步履从容，任四周繁花绿叶随风而动，这份云淡风轻，正是少年最珍贵的姿态。',anime:'「双手插兜不知道代表什么，但本大人这样做就是帅，这叫做"无理由的帅"！」'},en:{title:'Leisurely Stroll',quote:'"Walking alone, my shadow at the pool\'s bottom." — Jia Dao',desc:'Hands in pockets, unhurried steps.',anime:'"Hands in pockets — the Great Me doing it is cool. It\'s called \'inexplicable coolness\'!"'},fr:{title:'Promenade Tranquille',quote:'"Marchant seul." — Jia Dao',desc:'Mains dans les poches, pas tranquilles.',anime:'"Mains dans les poches — le Grand Moi ainsi c\'est cool!"'},ar:{title:'تجوال هادئ',quote:'"أمشي وحدي." — جيا داو',desc:'يدان في الجيبين، خطوات هادئة.',anime:'"يدان في الجيبين — الشخص العظيم هكذا يبدو رائعاً!"'}},
  {file:'6c8cca1dd070c7519c0d85ee3a5d833a.jpg',zh:{title:'浮生若梦',quote:'浮生若梦，为欢几何',author:'李白《春夜宴从弟桃花园序》',desc:'人生如白驹过隙，岁月如流水不返。在有限的光阴里，让每一刻都燃烧得绚烂如烟火。',anime:'「本大人偶尔也会感慨人生苦短……然后立刻继续帅气地活下去！」'},en:{title:'Life Like a Dream',quote:'"Floating life is like a dream." — Li Bai',desc:'Let every moment burn as brilliant as fireworks.',anime:'"The Great Me reflects on life\'s brevity... then immediately continues living dashingly!"'},fr:{title:'La Vie comme un Rêve',quote:'"La vie flottante est comme un rêve." — Li Bai',desc:'Que chaque instant brûle aussi brillant que les feux d\'artifice.',anime:'"Le Grand Moi réfléchit à la brièveté de la vie... puis continue!"'},ar:{title:'الحياة كحلم',quote:'"الحياة العائمة كحلم." — لي باي',desc:'دعوا كل لحظة تشتعل كالألعاب النارية.',anime:'"الشخص العظيم يتأمل قصر العمر... ثم يكمل فوراً!"'}},
  {file:'72ae6ae4b72f4fa3931a7b34982705b2.jpg',zh:{title:'持诏天下',quote:'笔落惊风雨，诗成泣鬼神',author:'杜甫《寄李十二白二十韵》',desc:'一纸金黄，承载无限意气。手持诏书，俯身细观，是龟兹国王颁布王命的庄严时刻，字字如金。',anime:'「此乃本大人亲笔御诏！内容嘛……就是命令全世界承认本大人的帅！」'},en:{title:'Royal Decree',quote:'"His brush falls like wind and rain." — Du Fu',desc:'The solemn moment the King issues his command.',anime:'"This is the Great Me\'s imperial decree! Ordering the world to acknowledge my greatness!"'},fr:{title:'Décret Royal',quote:'"Son pinceau tombe comme pluie et vent." — Du Fu',desc:'Le moment solennel où le Roi émet son commandement.',anime:'"C\'est le décret impérial du Grand Moi!"'},ar:{title:'المرسوم الملكي',quote:'"ريشته تسقط كالريح والمطر." — دو فو',desc:'اللحظة الرهيبة التي يصدر فيها الملك أمره.',anime:'"هذا مرسوم الشخص العظيم!"'}},
  {file:'79d7f866fb099d59e38801e641012680.jpg',zh:{title:'云淡风轻',quote:'不识庐山真面目，只缘身在此山中',author:'苏轼《题西林壁》',desc:'置身山中，方知大自然之广博。人生亦然，唯跳脱局外，方能见得真相，笑看风云变幻。',anime:'「什么？你说看不清本大人的真容？那是因为本大人太帅了，需要保持距离才能欣赏！」'},en:{title:'Clouds Light, Wind Gentle',quote:'"I cannot see the true face of Mount Lu — for I stand inside the mountain." — Su Shi',desc:'Only by stepping outside can one see the truth.',anime:'"Can\'t see the Great Me clearly? That\'s because I\'m too dazzling — you need distance!"'},fr:{title:'Nuages Légers',quote:'"Je ne peux pas voir le vrai visage du Mont Lu." — Su Shi',desc:'Seulement en sortant peut-on voir la vérité.',anime:'"Vous ne voyez pas clairement le Grand Moi? C\'est parce que je suis trop éblouissant!"'},ar:{title:'غيوم خفيفة',quote:'"لا أستطيع رؤية وجه الجبل الحقيقي." — سو شي',desc:'فقط بالخروج يمكن رؤية الحقيقة.',anime:'"لا ترى الشخص العظيم بوضوح؟ لأنني مبهر جداً!"'}},
  {file:'8660923a2818c2eec86538776e95ac7f.jpg',zh:{title:'倦游小憩',quote:'相看两不厌，只有敬亭山',author:'李白《独坐敬亭山》',desc:'旅途漫漫，一人沉入梦乡，一人含笑凝思，各得其趣。此刻车窗外的风景，不及车内的温情珍贵。',anime:'「他睡着了，本大人在思考人生。结论：睡觉比思考人生更快乐！」'},en:{title:'Wearied Traveler\'s Rest',quote:'"We never tire of gazing at each other." — Li Bai',desc:'The scenery outside the window is less precious than the warmth within.',anime:'"He fell asleep, the Great Me is pondering life. Conclusion: sleeping is happier!"'},fr:{title:'Repos du Voyageur',quote:'"Nous ne nous lassons jamais de nous regarder." — Li Bai',desc:'Le paysage extérieur est moins précieux que la chaleur intérieure.',anime:'"Il s\'est endormi. Conclusion: dormir c\'est plus heureux!"'},ar:{title:'استراحة المسافر',quote:'"لا نمل من النظر إلى بعضنا." — لي باي',desc:'المنظر الخارجي أقل ثمناً من الدفء الداخلي.',anime:'"نام. الخلاصة: النوم أسعد!"'}},
  {file:'8d1dbc92368df07c88c1bac7ad59602f.jpg',zh:{title:'月下清吟',quote:'举杯邀明月，对影成三人',author:'李白《月下独酌》',desc:'独处之时亦是自省之时。与月光为伴，与自我对话，于无声处听惊雷，于无形中见真我。',anime:'「本大人独处时也很有气质的，毕竟孤独是强者的标配，寂寞是王者的专属！」'},en:{title:'Moonlit Reverie',quote:'"I raise my cup to invite the bright moon — we become three." — Li Bai',desc:'Hearing thunder in silence, seeing one\'s true face in the formless.',anime:'"The Great Me is also distinguished when alone — solitude is the mark of the strong!"'},fr:{title:'Rêverie au Clair de Lune',quote:'"Je lève ma coupe pour inviter la lune." — Li Bai',desc:'Entendant le tonnerre dans le silence.',anime:'"Le Grand Moi est très distingué dans la solitude!"'},ar:{title:'تأمل ضوء القمر',quote:'"أرفع كأسي لأدعو القمر." — لي باي',desc:'سماع الرعد في الصمت.',anime:'"الشخص العظيم يتميز في العزلة — الوحدة علامة الأقوياء!"'}},
  {file:'9094895eff31a58b95f7bf78a72459e9.jpg',zh:{title:'长风万里',quote:'长风破浪会有时，直挂云帆济沧海',author:'李白《行路难》',desc:'前路漫漫，风浪无尽，然而真正的勇者从不因险阻而退缩，终将乘风破浪抵达属于自己的彼岸。',anime:'「本大人的人生字典里没有"放弃"二字，只有"暂时战略性撤退"，明白了吗？！」'},en:{title:'Ten Thousand Miles of Wind',quote:'"The day will come when I shall break the heavy waves." — Li Bai',desc:'The truly brave never yield.',anime:'"The words \'give up\' do not exist in the Great Me\'s dictionary!"'},fr:{title:'Dix Mille Li de Vent',quote:'"Le jour viendra où je briserai les lourdes vagues." — Li Bai',desc:'Le vrai courageux ne cède jamais.',anime:'"\'Abandonner\' n\'existe pas dans le dictionnaire du Grand Moi!"'},ar:{title:'عشرة آلاف لي من الريح',quote:'"سيأتي اليوم حين أكسر الأمواج الثقيلة." — لي باي',desc:'الشجاع الحقيقي لا يستسلم.',anime:'"\'استسلام\' لا توجد في قاموس الشخص العظيم!"'}},
  {file:'a33fb755980268669ae7597673b457b3.jpg',zh:{title:'笑傲山河',quote:'仰天大笑出门去，我辈岂是蓬蒿人',author:'李白《南陵别儿童入京》',desc:'笑声震天，意气风发，以超然之姿俯瞰众生。这便是王者气度的真实写照，无需低头，唯有向前。',anime:'「哈哈哈！本大人今天也是充满无限可能的一天！全宇宙都要注意了！」'},en:{title:'Laughing at the World',quote:'"I raise my head and laugh heartily as I depart." — Li Bai',desc:'No need to bow, only to forge ahead.',anime:'"Hahaha! Today is another day of infinite possibilities! The entire universe, take notice!"'},fr:{title:'Riant du Monde',quote:'"Je lève la tête et ris de tout mon cœur." — Li Bai',desc:'Pas besoin de baisser la tête, seulement d\'avancer.',anime:'"Hahaha! C\'est encore un jour plein de possibilités infinies!"'},ar:{title:'الضحك على العالم',quote:'"أرفع رأسي وأضحك بقلبي." — لي باي',desc:'لا حاجة للانحناء، فقط للمضي قدماً.',anime:'"هاهاها! يوم آخر مليء بإمكانيات لا حدود لها!"'}},
  {file:'a9e4e0cc8b084930a7fcf9f75bc5fa9d.jpg',zh:{title:'天涯归客',quote:'此夜曲中闻折柳，何人不起故园情',author:'李白《春夜洛城闻笛》',desc:'游历四方，见识广博，然而心中最温柔的一隅，永远留给那个叫做"家"的地方。走得再远，也是归人。',anime:'「本大人走了那么多地方，终于明白——最帅的风景，其实就在自己身旁！」'},en:{title:'Wanderer\'s Return',quote:'"Tonight, hearing the willow song — who does not feel longing for home?" — Li Bai',desc:'The tenderest corner of the heart is forever reserved for home.',anime:'"After traveling so many places — the finest scenery is right beside oneself!"'},fr:{title:'Le Retour du Voyageur',quote:'"Ce soir, entendant la chanson du saule." — Li Bai',desc:'Le coin le plus tendre du cœur est réservé à la maison.',anime:'"Après tant d\'endroits — le plus beau paysage est juste à côté!"'},ar:{title:'عودة المسافر',quote:'"الليلة، أسمع أغنية الصفصاف." — لي باي',desc:'أرق زاوية في القلب محجوزة للبيت.',anime:'"بعد السفر، أدرك أن أجمل المناظر هو بجانبه!"'}},
  {file:'b4139e38b495a8f0b2e3fda8663ab7bd.jpg',zh:{title:'饕餮盛宴',quote:'人生得意须尽欢，莫使金樽空对月',author:'李白《将进酒》',desc:'大快朵颐，不亦乐乎！龟兹国王深谙饮食之道，一碗面条亦能吃出帝王之气，食色天下，唯我独尊。',anime:'「吃！使劲吃！本大人的战斗力和帅气指数都是靠这碗面支撑的，不服来辩！」'},en:{title:'The Royal Banquet',quote:'"When life goes well, enjoy it fully." — Li Bai',desc:'Even a bowl of noodles is consumed with imperial grandeur.',anime:'"Eat! The Great Me\'s battle power is sustained by this bowl of noodles!"'},fr:{title:'Le Festin Royal',quote:'"Quand la vie va bien, profitez-en." — Li Bai',desc:'Même un bol de nouilles est consommé avec grandeur.',anime:'"Mangez! Le pouvoir du Grand Moi est soutenu par ce bol de nouilles!"'},ar:{title:'الوليمة الملكية',quote:'"حين تسير الحياة بشكل جيد، استمتع." — لي باي',desc:'حتى وعاء من المعكرونة يُتناول بعظمة.',anime:'"كل! قوة الشخص العظيم مدعومة بهذا الوعاء!"'}},
  {file:'bcf78eecc206c25126e7a9cf74e55e5d.jpg',zh:{title:'杖藜踏青',quote:'山重水复疑无路，柳暗花明又一村',author:'陆游《游山西村》',desc:'一杆竹杖，一背行囊，踏上绿意葱茏的山间小道。前路蜿蜒，却步履坚定，这便是探索者的风范。',anime:'「本大人出门探险必须要有登山杖，这不是装备，这叫做"仪式感"！」'},en:{title:'Hiking with Staff',quote:'"After mountains and rivers with no apparent way — another village!" — Lu You',desc:'A bamboo staff, a backpack — stepping onto a lush mountain path.',anime:'"The Great Me must have a hiking staff — this is not equipment, it\'s \'sense of ceremony\'!"'},fr:{title:'Randonnée avec Bâton',quote:'"Après montagnes et rivières — un autre village!" — Lu You',desc:'Un bâton de bambou, un sac à dos.',anime:'"Le Grand Moi doit avoir un bâton — c\'est le \'sens du rituel\'!"'},ar:{title:'المشي بالعصا',quote:'"بعد الجبال والأنهار — قرية أخرى!" — لو يو',desc:'عصا خيزران، حقيبة ظهر.',anime:'"يجب أن يكون مع الشخص العظيم عصا — هذا \'حس الطقوس\'!"'}},
  {file:'c1b8bc533bee973aca9b8ce634e2b184.jpg',zh:{title:'龙眠千载',quote:'春眠不觉晓，处处闻啼鸟',author:'孟浩然《春晓》',desc:'好眠乃养生之道，龟兹国王深知劳逸结合之真谛。高强度的帅气修炼之后，需要充足的休憩以迎接下一场王者降临。',anime:'「请勿打扰！本大人正在进行高强度冥想训练！（总之就是在睡觉，不要问了！）」'},en:{title:'The Dragon Slumbers',quote:'"In spring slumber, I don\'t notice dawn." — Meng Haoran',desc:'Adequate repose prepares for the next royal descent.',anime:'"Do not disturb! The Great Me is in high-intensity meditation! (It\'s just sleep!)"'},fr:{title:'Le Dragon Sommeille',quote:'"Dans le sommeil printanier, je ne remarque pas l\'aube." — Meng Haoran',desc:'Un repos adéquat prépare la prochaine descente royale.',anime:'"Ne pas déranger! C\'est juste du sommeil!"'},ar:{title:'تنين نائم',quote:'"في النوم الربيعي، لا أشعر بالفجر." — منغ هاورآن',desc:'الراحة الكافية ضرورية للتجلي الملكي القادم.',anime:'"لا تقاطعوا! إنه مجرد نوم!"'}},
  {file:'cd73a54c2d99d3cbeebd86060dbc5ba9.jpg',zh:{title:'御风而行',quote:'乘天地之正，而御六气之辩',author:'庄子《逍遥游》',desc:'不为世俗所缚，随心所至，如庄周梦蝶般自由，此乃真正的逍遥境界，无拘无束，天地任我行。',anime:'「本大人不是在漫无目的地乱走，本大人叫做"随缘探索"，差别很大，你懂吗？！」'},en:{title:'Riding the Wind',quote:'"Riding the proper forces of Heaven and Earth." — Zhuangzi',desc:'Unbound by worldly convention, going where the heart leads.',anime:'"The Great Me is NOT wandering aimlessly — it\'s called \'destiny-guided exploration\'!"'},fr:{title:'Chevauchant le Vent',quote:'"Chevauchant les forces du Ciel et de la Terre." — Zhuangzi',desc:'Non lié par les conventions mondaines.',anime:'"Le Grand Moi ne se promène PAS sans but — c\'est \'exploration guidée par le destin\'!"'},ar:{title:'ركوب الريح',quote:'"ركوب القوى السليمة للسماء والأرض." — زوانغزي',desc:'غير مقيد بالأعراف الدنيوية.',anime:'"الشخص العظيم لا يتجول بلا هدف — يُسمى \'استكشافاً موجهاً\'!"'}},
  {file:'d5cd1581e2a645692e89f758eca4b6fc.jpg',zh:{title:'金色年华',quote:'少年侠气，交结五都雄',author:'贺铸《六州歌头》',desc:'年轻是最美好的资本，以昂扬之姿迎接每一个朝阳，书写属于自己的传奇篇章，让岁月为证。',anime:'「本大人的青春不是用来虚度的，是用来创造传说的！记住了，全部都给我记住了！」'},en:{title:'Golden Years',quote:'"The chivalric spirit of youth, forging bonds with heroes." — He Zhu',desc:'Youth is the finest capital. Writing one\'s own legendary chapter.',anime:'"The Great Me\'s youth is not meant to be wasted — it\'s meant for creating legends!"'},fr:{title:'Les Années Dorées',quote:'"L\'esprit chevaleresque de la jeunesse." — He Zhu',desc:'La jeunesse est le plus beau capital.',anime:'"La jeunesse du Grand Moi est faite pour créer des légendes!"'},ar:{title:'سنوات الذهب',quote:'"الروح الفروسية للشباب." — هه جو',desc:'الشباب هو أجمل رأس مال.',anime:'"شباب الشخص العظيم للأساطير!"'}},
  {file:'f7f5463c5c922ed360e89ebb98f3ddea.jpg',zh:{title:'凌云正气',quote:'长风几万里，吹度玉门关',author:'李白《关山月》',desc:'直视前方，眼神坚毅，绿意为屏，宁静为底。这是少年郎收敛所有锋芒后，最沉静也最有力的一面。',anime:'「本大人正在用眼神说话，内容是：全世界请注意，本大人到场了！」'},en:{title:'Righteous Spirit',quote:'"The long wind blows ten thousand miles, sweeping past Jade Gate Pass." — Li Bai',desc:'Gazing straight ahead, eyes resolute.',anime:'"The Great Me is speaking with my eyes — world, please note, the Great Me has arrived!"'},fr:{title:'Esprit Juste',quote:'"Le long vent souffle dix mille lieues." — Li Bai',desc:'Regard droit devant, yeux résolus.',anime:'"Le Grand Moi parle avec mes yeux — monde, prenez note!"'},ar:{title:'روح نبيلة',quote:'"الريح الطويلة تهب عشرة آلاف لي." — لي باي',desc:'نظرة مباشرة للأمام، عيون حازمة.',anime:'"الشخص العظيم يتحدث بعيني — العالم، تنبه!"'}},
  {file:'ff90f9dcca908c1db64cce7658c3b829.jpg',zh:{title:'踞地生威',quote:'气吞万里如虎',author:'辛弃疾《永遇乐·京口北固亭怀古》',desc:'双臂交叉，傲立南国芭蕉林间，气势如山岳般稳重。龟兹国王的威严，不需要言语，只需要这一个眼神。',anime:'「本大人站在这里什么都不用说，气场就已经覆盖了方圆三公里！」'},en:{title:'Commanding Presence',quote:'"His spirit swallows ten thousand miles like a tiger." — Xin Qiji',desc:'The King\'s authority needs no words, only this one gaze.',anime:'"The Great Me says nothing here — my aura already covers a three-kilometer radius!"'},fr:{title:'Présence Imposante',quote:'"Son esprit engloutit dix mille lieues comme un tigre." — Xin Qiji',desc:'L\'autorité du Roi ne nécessite pas de mots.',anime:'"Le Grand Moi ne dit rien — mon aura couvre déjà trois kilomètres!"'},ar:{title:'حضور آمر',quote:'"روحه تبتلع عشرة آلاف لي كالنمر." — شين تشيجي',desc:'سلطة الملك لا تحتاج إلى كلمات.',anime:'"الشخص العظيم لا يقول شيئاً — هيبتي تغطي ثلاثة كيلومترات!"'}}
];

/* ── Stars & Particles ── */
(function(){
  const sf=document.getElementById('star-field');
  for(let i=0;i<180;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${-Math.random()*6}s;--lo:${.05+Math.random()*.25}`;sf.appendChild(s);}
  const pc=document.getElementById('particles');
  for(let i=0;i<35;i++){const p=document.createElement('div');p.className='particle';const sz=Math.random()*6+3;p.style.cssText=`--x:${Math.random()*100}%;--sz:${sz}px;--dur:${3+Math.random()*4}s;--delay:${-Math.random()*7}s`;pc.appendChild(p);}
})();

/* ── Build Marquee ── */
(function(){
  const track=document.getElementById('marqTrack');
  [...PHOTOS,...PHOTOS].forEach((p,i)=>{
    const idx=i%PHOTOS.length;
    const div=document.createElement('div');div.className='marq-card';
    div.innerHTML=`<img data-photo="${p.file}" alt="${p.zh.title}" class="locked"><div class="marq-lock">🔒</div><div class="marq-card-overlay"><div class="marq-card-title" data-midx="${idx}">${p.zh.title}</div></div>`;
    track.appendChild(div);
  });
})();

  PHOTOS.forEach((p,i)=>{
    const div=document.createElement('div');div.className='photo-card';
    div.innerHTML=`<div class="photo-img-wrap"><img data-photo="${p.file}" alt="${p.zh.title}" class="locked"><div class="lock-veil"><span class="lv-icon">🔒</span><p class="lv-txt">登录后查看</p></div></div><div class="photo-caption"><div class="photo-title" data-gidx="${i}" data-gfield="title">${p.zh.title}</div><div class="photo-quote" data-gidx="${i}" data-gfield="quote">${p.zh.quote}</div><div class="photo-author" data-gidx="${i}" data-gfield="author">${p.zh.author}</div><div class="photo-desc" data-gidx="${i}" data-gfield="desc">${p.zh.desc}</div><div class="photo-anime" data-gidx="${i}" data-gfield="anime">${p.zh.anime}</div></div>`;
    g.appendChild(div);
  });
})();

/* ── Splash ── */
let _statuses=I18N.zh.statuses,_si=0,_tt=null;
function typeStatus(msg){const el=document.getElementById('loadStatus');el.textContent='';let i=0;clearInterval(_tt);_tt=setInterval(()=>{if(i<msg.length)el.textContent+=msg[i++];else clearInterval(_tt);},38);}
const _start=Date.now(),_DUR=4000;
const _fill=document.getElementById('progressFill'),_pct=document.getElementById('pctNum');
function animLoad(){const t=Math.min((Date.now()-_start)/_DUR,1),e=1-Math.pow(1-t,3),p=Math.floor(e*100);_fill.style.width=p+'%';_pct.textContent=p;if(t<1)requestAnimationFrame(animLoad);}
requestAnimationFrame(animLoad);
setTimeout(()=>typeStatus(_statuses[0]),500);
const _mi=setInterval(()=>{_si=(_si+1)%_statuses.length;typeStatus(_statuses[_si]);},1500);
setTimeout(()=>{
  clearInterval(_mi);clearInterval(_tt);
  const flash=document.getElementById('flash');
  flash.style.opacity='1';
  setTimeout(()=>{
    flash.style.opacity='0';
    document.getElementById('splash').classList.add('exit');
    document.getElementById('main').style.opacity='1';
    document.getElementById('lang-bar').style.opacity='1';
    const ubtn=document.getElementById('unlock-btn');
    ubtn.style.display='block';
    const saved=sessionStorage.getItem('kzg_token');
    if(saved&&isTokenAlive(saved)){doUnlock(saved);}
  },180);
},_DUR+400);

/* ── 图片加载（Authorization 头 + blob URL，token 不出现在地址栏）── */
async function loadPhoto(img, token){
  try{
    const res = await fetch(`${WORKER}/photo/${img.dataset.photo}`,{
      headers:{'Authorization':'Bearer '+token}
    });
    if(!res.ok) return;
    const blob = await res.blob();
    img.src = URL.createObjectURL(blob);
    img.classList.remove('locked');
  }catch{}
}

/* ── Token ── */
function isTokenAlive(token){
  try{const p=JSON.parse(atob(token.split('.')[0]));return p.exp>Date.now();}catch{return false;}
}

/* ── Auth ── */
function openModal(){document.getElementById('login-modal').classList.add('open');setTimeout(()=>document.getElementById('mUser').focus(),100);}
function closeModal(){document.getElementById('login-modal').classList.remove('open');}
function switchPanel(p){
  document.getElementById('panel-cred').style.display=p==='cred'?'':'none';
  document.getElementById('panel-question').style.display=p==='question'?'':'none';
  if(p==='question')setTimeout(()=>document.getElementById('mAns').focus(),100);
  else setTimeout(()=>document.getElementById('mUser').focus(),100);
  return false;
}

function doUnlock(token){
  sessionStorage.setItem('kzg_token',token);
  document.body.classList.add('unlocked');
  document.querySelectorAll('img[data-photo]').forEach(img=>loadPhoto(img,token));
  const btn=document.getElementById('unlock-btn');
  btn.textContent='已解锁 ✓';btn.className='done';btn.onclick=null;
  closeModal();
}

async function tryLogin(){
  const u=document.getElementById('mUser').value.trim();
  const p=document.getElementById('mPass').value.trim();
  const err=document.getElementById('mErr');
  const btn=document.getElementById('loginBtn');
  if(!u||!p){err.textContent='请填写邮箱和密码';return;}
  btn.disabled=true;btn.textContent='验证中...';err.textContent='';
  try{
    const res=await fetch(`${WORKER}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data=await res.json();
    if(data.success&&data.token){doUnlock(data.token);}
    else{err.textContent=data.error||'邮箱或密码错误';document.getElementById('mPass').value='';document.getElementById('mPass').focus();}
  }catch{err.textContent='连接失败，请使用其他验证方式';}
  finally{btn.disabled=false;btn.textContent='入　境';}
}

async function tryQuestion(){
  const ans=document.getElementById('mAns').value.trim();
  const err=document.getElementById('mQErr');
  const btn=document.getElementById('qBtn');
  if(!ans){err.textContent='请输入答案';return;}
  btn.disabled=true;btn.textContent='验证中...';err.textContent='';
  try{
    const res=await fetch(`${WORKER}/question`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answer:ans})});
    const data=await res.json();
    if(data.success&&data.token){doUnlock(data.token);}
    else{err.textContent='答案不正确，请重试';document.getElementById('mAns').value='';document.getElementById('mAns').focus();}
  }catch{err.textContent='连接失败，请稍后重试';}
  finally{btn.disabled=false;btn.textContent='确　认';}
}

document.getElementById('mUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('mPass').focus();});
document.getElementById('mPass').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
document.getElementById('mAns').addEventListener('keydown',e=>{if(e.key==='Enter')tryQuestion();});
document.getElementById('login-modal').addEventListener('click',e=>{if(e.target===document.getElementById('login-modal'))closeModal();});

/* ── Lang ── */
let currentLang='zh';
function setLang(lang){
  currentLang=lang;
  const html=document.documentElement;
  html.lang={zh:'zh-CN',en:'en',fr:'fr',ar:'ar'}[lang];
  html.dir=lang==='ar'?'rtl':'ltr';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  const t=I18N[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(t[k]!==undefined)el.textContent=t[k];});
  document.querySelectorAll('[data-gidx]').forEach(el=>{const i=+el.dataset.gidx,f=el.dataset.gfield,ph=PHOTOS[i];el.textContent=(ph[lang]&&ph[lang][f]!==undefined)?ph[lang][f]:ph.zh[f];});
  document.querySelectorAll('[data-midx]').forEach(el=>{const i=+el.dataset.midx,ph=PHOTOS[i];el.textContent=(ph[lang]&&ph[lang].title)?ph[lang].title:ph.zh.title;});
  _statuses=t.statuses||I18N.zh.statuses;
  document.querySelectorAll('.lv-txt').forEach(e=>e.textContent={zh:'登录后查看',en:'Login to view',fr:'Connexion requise',ar:'سجّل دخولك للمشاهدة'}[lang]||'登录后查看');
}
setLang('zh');
</script>

<!-- MUSIC PLAYER -->
<audio id="bgm" src="videoplayback.mp4" loop preload="none"></audio>
<div id="music-player">
  <div id="music-eq" title="点击播放/暂停" onclick="togglePlay()">
    <span></span><span></span><span></span><span></span>
  </div>
  <button id="music-playbtn" onclick="togglePlay()" title="播放/暂停">▶</button>
  <input id="music-vol" type="range" min="0" max="1" step="0.01" value="0.6" oninput="setVol(this.value)" title="音量">
  <button id="music-mute" onclick="toggleMute()" title="静音">🔊</button>
</div>
<script>
const bgm=document.getElementById('bgm');
const player=document.getElementById('music-player');
const playBtn=document.getElementById('music-playbtn');
const muteBtn=document.getElementById('music-mute');
const vol=document.getElementById('music-vol');
bgm.volume=0.6;
let muted=false,prevVol=0.6;

function togglePlay(){
  if(bgm.paused){bgm.play();player.classList.add('playing');playBtn.textContent='⏸';}
  else{bgm.pause();player.classList.remove('playing');playBtn.textContent='▶';}
}
function setVol(v){
  bgm.volume=v;
  muted=v==0;
  muteBtn.textContent=v==0?'🔇':'🔊';
}
function toggleMute(){
  if(!muted){prevVol=bgm.volume;bgm.volume=0;vol.value=0;muteBtn.textContent='🔇';muted=true;}
  else{bgm.volume=prevVol||0.6;vol.value=bgm.volume;muteBtn.textContent='🔊';muted=false;}
}
</script>
</body>
</html>
